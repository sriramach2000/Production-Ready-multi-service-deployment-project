global:
  scrape_interval: << prometheus_scrape_interval >>
  evaluation_interval: << prometheus_evaluation_interval >>

scrape_configs:
  - job_name: "fastapi"
    static_configs:
      - targets: ["api:<< api_port >>"]
    metrics_path: "/metrics"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
